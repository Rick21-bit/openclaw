<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Control</title>
  <meta name="description" content="OpenClaw — self-hosted multi-channel AI agent gateway.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 12l10 5 10-5"></path>
          <path d="M2 17l10 5 10-5"></path>
        </svg>
      </div>
      <div class="brand-text">
        <div>OpenClaw</div>
        <span class="tag">beta</span>
      </div>
    </div>

    <nav class="nav" id="main-nav">
      <a href="#chat" data-page="chat" class="nav-link"><span class="icon" aria-hidden="true">💬</span> Chat</a>
      <a href="#sessions" data-page="sessions" class="nav-link"><span class="icon" aria-hidden="true">🖥️</span> Sessions</a>
      <a href="#channels" data-page="channels" class="nav-link"><span class="icon" aria-hidden="true">📡</span> Channels</a>
      <a href="#skills" data-page="skills" class="nav-link"><span class="icon" aria-hidden="true">🛠️</span> Skills / ClawHub</a>
      <a href="#memory" data-page="memory" class="nav-link"><span class="icon" aria-hidden="true">🧠</span> Memory</a>
      <a href="#settings" data-page="settings" class="nav-link"><span class="icon" aria-hidden="true">⚙️</span> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="status-line">
        <span class="status-dot online" id="agent-dot"></span>
        <span id="agent-status">Agent online</span>
      </div>
      <small>v1.0.0 · self-hosted</small>
    </div>
  </aside>

  <div class="app">
    <header class="topbar">
      <button class="menu-btn" id="menu-btn" aria-label="Open menu">☰</button>
      <div class="topbar-left">
        <h1 id="page-title">Chat</h1>
      </div>
      <div class="topbar-right">
        <label class="model-wrap">
          <span>Model</span>
          <select id="model-selector" class="model-select"></select>
        </label>
        <button class="btn secondary" id="quick-memory">+ Memory</button>
        <button class="btn" id="restart-agent">Restart Agent</button>
        <div class="user-pill" title="Local user">You</div>
      </div>
    </header>

    <main id="page-content">
      <!-- Pages rendered here by app.js -->
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
